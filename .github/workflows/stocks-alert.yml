name: Stock Price Alert S&P500

on:
  schedule:
    # 10:05 AM y 3:05 PM EST (hora NY) — lunes a viernes
    - cron: "5 14,20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Asegurar archivo de estado
        run: |
          test -f stock_state.json || echo "{}" > stock_state.json

      - name: Ejecutar script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alert.py

      - name: Guardar estado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock_state.json
          git diff --cached --quiet || git commit -m "Actualizar estado de acciones"
          git push
