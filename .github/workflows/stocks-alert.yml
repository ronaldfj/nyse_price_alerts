name: Stock Sentinel Alerts

on:
  schedule:
    # 10:12 AM y 3:12 PM America/New_York — lunes a viernes
    - cron: "12 10,15 * * 1-5"
      timezone: "America/New_York"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-sentinel
  cancel-in-progress: true

jobs:
  run-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ALERTS_HISTORY_FILE: alerts_history.csv

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true

      - name: Instalar Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Asegurar archivos persistentes
        run: |
          test -f stock_state.json || echo "{}" > stock_state.json
          test -f alerts_history.csv || touch alerts_history.csv

      - name: Ejecutar scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MARKET_CONTEXT_FILE: market_context_stocks.json
          STOCK_STATE_FILE: stock_state.json
          ALERTS_HISTORY_FILE: alerts_history.csv
          TRACKER_ENABLED: "true"
          TRACKER_MAX_BARS_OPEN: "20"
          EARNINGS_BUFFER_DAYS: "5"
          VIX_BLOCK_LEVEL: "30"
          VIX_CAUTION_LEVEL: "22"
          TRIGGER_VOL_RATIO: "1.00"
          SETUP_RSI_MIN: "45"
          SETUP_RSI_MAX: "66"
          BREAKOUT_RSI_MAX: "76"
          BREAKOUT_MAX_ATR: "3.20"
          BREAKOUT_RS_MIN: "-0.5"
          FINAL_RS_MIN: "0.0"
          RS_LOOKBACK: "20"
          SWING_LOOKBACK: "12"
          MIN_SCORE: "5.8"
          MIN_RR: "0.8"
          COOLDOWN_HOURS: "24"
          REQUIRE_PLAYBOOK: "true"
          ALERT_ETFS: "false"
          # -- Iteracion 2.0 -- Entry Quality Filter --
          BREAKOUT_ATR_GATE: "2.0"
          BREAKOUT_EXTENDED_VOL_RATIO: "1.8"
          POST_STOP_COOLDOWN_HOURS: "72"
          POST_STOP_SCORE_PENALTY: "1.0"
          SLOPE_CONSISTENCY_RATIO: "0.3"
          SLOPE_WEAK_PENALTY: "0.4"
          # -- Iteracion 2.2 -- Group-Aware RS + Dynamic Vol Gate --
          FINAL_RS_MIN_BY_GROUP: "Finance:-4.0,Health:-4.0,Consumer:-2.0,Industrial:-2.0,Energy:-3.0"
          VIX_LOW_LEVEL: "18.0"
          BREAKOUT_EXTENDED_VOL_RATIO_LOW_VIX: "1.5"
          # -- Iteracion 2.1 -- Confluence + Adaptive Scoring --
          CONFLUENCE_THRESHOLD: "4"
          CONFLUENCE_BONUS: "0.8"
          ADAPTIVE_RR_EXTENSION_THRESHOLD: "20.0"
          ADAPTIVE_RR_MULTIPLIER: "1.25"
          VOLUME_PROFILE_LOOKBACK: "3"
          VOLUME_PROFILE_PENALTY: "0.5"
          # -- Iteracion 2.5 -- Quality Filters + Risk Sizing --
          BREADTH_ENABLED: "true"
          BREADTH_MIN_PCT: "50.0"
          BREADTH_BLOCK_BELOW: "40.0"
          ACCOUNT_SIZE_USD: "10000"
          RISK_PER_TRADE_PCT: "1.0"
          GAP_BLOCK_PCT: "2.0"
          GAP_FILTER_ENABLED: "true"
          CORRELATION_GUARD_ENABLED: "true"
          BATCH_DOWNLOAD_ENABLED: "true"
          # -- Iteracion 2.6 -- Quality Hardening (post-XLP) --
          CONFLUENCE_HARD_FLOOR: "2"
          CONFLUENCE_SOFT_FLOOR: "3"
          CONFLUENCE_LOW_PENALTY: "0.5"
          SUPERTREND_BLOCK_ADX_MIN: "15.0"
          SUPERTREND_BLOCK_RS_NEG: "true"
          ETF_RS_FLOOR: "-3.0"
          # -- Iteracion 2.8 -- Pullback Secundario (cascada fija + sizing 50%) --
          PULLBACK_MIN_CONFLUENCE: "2"
          PULLBACK_MIN_RS: "0.0"
          PULLBACK_MIN_ADX: "18.0"
          PULLBACK_MIN_SCORE_BONUS: "0.3"
          PULLBACK_MAX_BARS: "12"
        run: python alert.py

      - name: Analizar histórico
        if: always()
        run: |
          python analyze_alerts_history.py --input alerts_history.csv
          ls -la
          ls -la analysis_output || true

      - name: Subir reporte de análisis
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: alerts-analysis
          path: analysis_output/

      - name: Guardar estado e histórico
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock_state.json alerts_history.csv
          git diff --cached --quiet || git commit -m "chore: update stock scanner state and alert history"
          git push

  # ── Backtest — solo se ejecuta manualmente (workflow_dispatch) ──────────────
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    needs: run-alert

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4.2.2

      - name: Instalar Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar backtest
        env:
          MIN_SCORE: "5.8"
          MIN_RR: "0.8"
          SETUP_RSI_MIN: "45"
          SETUP_RSI_MAX: "66"
          BREAKOUT_RSI_MAX: "76"
          BREAKOUT_MAX_ATR: "3.20"
          BREAKOUT_RS_MIN: "-0.5"
          FINAL_RS_MIN: "0.0"
          RS_LOOKBACK: "20"
          SWING_LOOKBACK: "12"
          TRIGGER_VOL_RATIO: "1.00"
          VIX_BLOCK_LEVEL: "30"
          VIX_CAUTION_LEVEL: "22"
          VIX_LOW_LEVEL: "18.0"
          BREAKOUT_ATR_GATE: "2.0"
          BREAKOUT_EXTENDED_VOL_RATIO: "1.8"
          BREAKOUT_EXTENDED_VOL_RATIO_LOW_VIX: "1.5"
          SLOPE_CONSISTENCY_RATIO: "0.3"
          SLOPE_WEAK_PENALTY: "0.4"
          CONFLUENCE_THRESHOLD: "4"
          CONFLUENCE_BONUS: "0.8"
          ADAPTIVE_RR_EXTENSION_THRESHOLD: "20.0"
          ADAPTIVE_RR_MULTIPLIER: "1.25"
          VOLUME_PROFILE_LOOKBACK: "3"
          VOLUME_PROFILE_PENALTY: "0.5"
          FINAL_RS_MIN_BY_GROUP: "Finance:-4.0,Health:-4.0,Consumer:-2.0,Industrial:-2.0,Energy:-3.0"
          # -- v2.8 Pullback Secundario (sizing 50% fijo en codigo) --
          PULLBACK_MIN_CONFLUENCE: "2"
          PULLBACK_MIN_RS: "0.0"
          PULLBACK_MIN_ADX: "18.0"
          PULLBACK_MIN_SCORE_BONUS: "0.3"
          PULLBACK_MAX_BARS: "12"
        run: |
          python backtest.py --years 3 --export-features

      - name: Advanced analytics sobre backtest
        if: always()
        run: |
          python advanced_analytics.py \
            --input backtest_output/backtest_trades.csv \
            --outdir backtest_output/analytics \
            --capital 10000 \
            --risk-pct 1.0 \
            --commission 1.0 \
            --slippage-pct 0.05 \
            --mc-runs 2000 \
            --rolling-window 30

      - name: Advanced analytics sobre live
        if: always()
        run: |
          if [ -s alerts_history.csv ]; then
            python advanced_analytics.py \
              --input alerts_history.csv \
              --outdir backtest_output/analytics_live \
              --capital 10000 \
              --mc-runs 1000 || echo "Pocos trades para analytics live, omitido"
          fi

      - name: Comparacion de playbooks (Fase B)
        if: always()
        run: |
          python compare_playbooks.py \
            --input backtest_output/backtest_trades.csv \
            --outdir backtest_output/playbook_comparison \
            --capital 10000 \
            --risk-pct 1.0 \
            --commission 1.0 \
            --slippage-pct 0.05 \
            --mc-runs 2000

      - name: Subir resultados del backtest
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backtest-results
          path: backtest_output/
          retention-days: 30

      - name: Commitear resultados al repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p backtest_output
          git add backtest_output/
          git diff --cached --quiet && echo "Sin cambios, nada que commitear" && exit 0
          git commit -m "chore: backtest results $(date -u +%Y-%m-%d)"
          # Reintento robusto: fetch + rebase + push (hasta 3 intentos)
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            git push && break
            echo "Intento $i fallido, reintentando..."
            sleep 5
          done
