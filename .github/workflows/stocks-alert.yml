name: Stock Sentinel Alerts

on:
  schedule:
    # 10:12 AM y 3:12 PM America/New_York — lunes a viernes
    - cron: "12 10,15 * * 1-5"
      timezone: "America/New_York"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-sentinel
  cancel-in-progress: true

jobs:
  run-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Asegurar archivo de estado
        run: |
          test -f stock_state.json || echo "{}" > stock_state.json

      - name: Ejecutar scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MARKET_CONTEXT_FILE: market_context_stocks.json
          STOCK_STATE_FILE: stock_state.json
          MIN_SCORE: "6.0"
          MIN_RR: "1.9"
          COOLDOWN_HOURS: "48"
          EARNINGS_BUFFER_DAYS: "5"
          VIX_BLOCK_LEVEL: "30"
          VIX_CAUTION_LEVEL: "22"
          TRIGGER_VOL_RATIO: "1.4"
          SETUP_RSI_MIN: "45"
          SETUP_RSI_MAX: "65"
          RS_LOOKBACK: "20"
          SWING_LOOKBACK: "12"
        run: python alert.py

      - name: Guardar estado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock_state.json
          git diff --cached --quiet || git commit -m "chore: update stock scanner state"
          git push
