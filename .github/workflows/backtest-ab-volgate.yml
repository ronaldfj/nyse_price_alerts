# .github/workflows/backtest-ab-volgate.yml
# Backtest A/B: baseline v2.10 vs BREAKOUT_VOL_HARD_GATE=1.5
# Ejecutar manualmente desde la pestaña Actions (workflow_dispatch).

name: Backtest A/B — Vol Hard Gate

on:
  workflow_dispatch:
    inputs:
      years:
        description: "Años de backtest"
        default: "3"
      gate:
        description: "Vol hard gate a probar"
        default: "1.5"

concurrency:
  group: backtest-ab
  cancel-in-progress: false

jobs:
  ab-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: "Run A — baseline (gate desactivado)"
        env:
          BREAKOUT_VOL_HARD_GATE: "0"
        run: |
          python backtest.py --years ${{ inputs.years }}
          mv backtest_output run_baseline

      - name: "Run B — vol hard gate ${{ inputs.gate }}"
        env:
          BREAKOUT_VOL_HARD_GATE: ${{ inputs.gate }}
        run: |
          python backtest.py --years ${{ inputs.years }}
          mv backtest_output run_gate

      - name: Comparar resultados
        run: |
          python - << 'EOF'
          import pandas as pd, numpy as np

          def stats(path, label):
              df = pd.read_csv(path)
              for c in ["price", "stop", "exit_price"]:
                  df[c] = pd.to_numeric(df[c], errors="coerce")
              r = (df["exit_price"] - df["price"]) / (df["price"] - df["stop"] + 1e-9)
              wr = df["status"].eq("hit_target").mean() * 100
              print(f"{label:22s} n={len(df):4d}  WR={wr:5.1f}%  "
                    f"Exp={np.nanmean(r):+.3f}R  Total={np.nansum(r):+.1f}R")
              return len(df), float(np.nanmean(r))

          nA, eA = stats("run_baseline/backtest_trades.csv", "A baseline")
          nB, eB = stats("run_gate/backtest_trades.csv", "B gate=${{ inputs.gate }}")

          print("\n--- VEREDICTO AUTOMÁTICO ---")
          if nB < 50:
              print(f"⚠️  n={nB} < 50 trades: riesgo de overfitting, NO elevar a hard block todavía.")
          elif eB > eA:
              print(f"✅ Gate mejora expectancy ({eA:+.3f}R → {eB:+.3f}R) con n={nB}. Candidato válido a producción.")
          else:
              print(f"❌ Gate NO mejora expectancy ({eA:+.3f}R → {eB:+.3f}R). Mantener como warning.")
          EOF

      - name: Subir reportes
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backtest-ab-volgate
          path: |
            run_baseline/backtest_report.md
            run_baseline/backtest_trades.csv
            run_gate/backtest_report.md
            run_gate/backtest_trades.csv
          retention-days: 30
