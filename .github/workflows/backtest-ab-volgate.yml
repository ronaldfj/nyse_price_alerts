# Backtest A/B: baseline v2.10 vs BREAKOUT_VOL_HARD_GATE
# Se dispara con push a ramas ab-test/** o manualmente (workflow_dispatch).
# Publica resultados commiteados en ab_results/ dentro de la misma rama.

name: Backtest A/B — Vol Hard Gate

on:
  workflow_dispatch:
    inputs:
      years:
        description: "Años de backtest"
        default: "3"
      gate:
        description: "Vol hard gate a probar"
        default: "1.5"
  push:
    branches: ["ab-test/**"]

concurrency:
  group: backtest-ab
  cancel-in-progress: false

jobs:
  ab-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: "Run A — baseline (gate desactivado)"
        env:
          BREAKOUT_VOL_HARD_GATE: "0"
        run: |
          python backtest.py --years ${{ inputs.years || '3' }}
          mv backtest_output run_baseline

      - name: "Run B — vol hard gate"
        env:
          BREAKOUT_VOL_HARD_GATE: ${{ inputs.gate || '1.5' }}
        run: |
          python backtest.py --years ${{ inputs.years || '3' }}
          mv backtest_output run_gate

      - name: Comparar resultados
        run: |
          mkdir -p ab_results
          python - << 'EOF' | tee ab_results/summary.txt
          import pandas as pd, numpy as np

          GATE = "${{ inputs.gate || '1.5' }}"

          def stats(path, label):
              df = pd.read_csv(path)
              for c in ["price", "stop", "exit_price"]:
                  df[c] = pd.to_numeric(df[c], errors="coerce")
              r = (df["exit_price"] - df["price"]) / (df["price"] - df["stop"] + 1e-9)
              wr = df["status"].eq("hit_target").mean() * 100
              print(f"{label:22s} n={len(df):4d}  WR={wr:5.1f}%  "
                    f"Exp={np.nanmean(r):+.3f}R  Total={np.nansum(r):+.1f}R")
              return len(df), float(np.nanmean(r))

          nA, eA = stats("run_baseline/backtest_trades.csv", "A baseline")
          nB, eB = stats("run_gate/backtest_trades.csv", f"B gate={GATE}")

          print("\n--- VEREDICTO AUTOMATICO ---")
          if nB < 50:
              print(f"ADVERTENCIA: n={nB} < 50 trades: riesgo de overfitting, NO elevar a hard block todavia.")
          elif eB > eA:
              print(f"OK: Gate mejora expectancy ({eA:+.3f}R -> {eB:+.3f}R) con n={nB}. Candidato valido a produccion.")
          else:
              print(f"NO: Gate no mejora expectancy ({eA:+.3f}R -> {eB:+.3f}R). Mantener como warning.")
          EOF
          cp run_baseline/backtest_report.md ab_results/baseline_report.md
          cp run_gate/backtest_report.md ab_results/gate_report.md
          cp run_baseline/backtest_trades.csv ab_results/baseline_trades.csv
          cp run_gate/backtest_trades.csv ab_results/gate_trades.csv

      - name: Publicar resultados en la rama
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ab_results
          git commit -m "chore: resultados backtest A/B vol gate [skip ci]"
          git push origin HEAD

      - name: Subir reportes como artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backtest-ab-volgate
          path: ab_results/
          retention-days: 30
